version: 1
canonical_instruction_file: "agents.md"
compatibility_entrypoints:
  - "agents.md"
  - ".github/copilot-instructions.md"
skills:
  - name: "pr-reviewer"
    path: ".agents/skills/pr-reviewer/SKILL.md"
    summary: "Review diffs and pull requests against repository rules."
    triggers:
      - "review this PR"
      - "audit these code changes"
      - "check this diff before merge"
    consult:
      - ".agents/rules/architect.md"
      - ".agents/rules/fastapi-rules.md"
      - ".agents/rules/react-rules.md"
      - ".agents/rules/security.md"
      - ".agents/rules/dba.md"
      - ".agents/rules/qa.md"
    replaces:
      - ".agents/workflows/code-review.md"
  - name: "performance-profiler"
    path: ".agents/skills/performance-profiler/SKILL.md"
    summary: "Run a repeatable backend and frontend performance audit."
    triggers:
      - "profile this app"
      - "investigate slow pages"
      - "run a performance audit"
    consult:
      - ".agents/rules/architect.md"
      - ".agents/rules/react-rules.md"
      - ".agents/rules/fastapi-rules.md"
      - ".agents/rules/dba.md"
    replaces:
      - ".agents/workflows/performance-audit.md"
  - name: "security-scanner"
    path: ".agents/skills/security-scanner/SKILL.md"
    summary: "Run a security audit across code, config, and dependencies."
    triggers:
      - "run a security review"
      - "audit auth and secrets handling"
      - "check this repo for security issues"
    consult:
      - ".agents/rules/security.md"
      - ".agents/rules/devops.md"
      - ".agents/rules/architect.md"
      - ".agents/rules/qa.md"
    replaces:
      - ".agents/workflows/security-audit.md"
  - name: "scaffold-backend-endpoint"
    path: ".agents/skills/scaffold-backend-endpoint/SKILL.md"
    summary: "Create a backend vertical slice for a new API resource."
    triggers:
      - "add a new endpoint"
      - "scaffold a backend resource"
      - "create CRUD for this model"
    consult:
      - ".agents/rules/fastapi-rules.md"
      - ".agents/rules/dba.md"
      - ".agents/rules/security.md"
      - ".agents/rules/qa.md"
  - name: "scaffold-frontend-component"
    path: ".agents/skills/scaffold-frontend-component/SKILL.md"
    summary: "Create a React component or feature slice with tests."
    triggers:
      - "add a frontend component"
      - "scaffold a UI feature"
      - "create a page section with tests"
    consult:
      - ".agents/rules/react-rules.md"
      - ".agents/rules/qa.md"
  - name: "scaffold-db-migration"
    path: ".agents/skills/scaffold-db-migration/SKILL.md"
    summary: "Create, review, and validate an Alembic migration."
    triggers:
      - "add a database migration"
      - "change this schema"
      - "create a new table migration"
    consult:
      - ".agents/rules/dba.md"
      - ".agents/rules/fastapi-rules.md"
      - ".agents/rules/qa.md"
  - name: "push-code-repo"
    path: ".agents/skills/push-code-repo/SKILL.md"
    summary: "Push committed code to the remote repo safely."
    triggers:
      - "push this branch"
      - "publish these commits"
      - "push the code to the repo"
    consult:
      - ".agents/rules/devops.md"
      - "agents.md"
